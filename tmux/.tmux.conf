# Prefix: Ctrl+A (more ergonomic than Ctrl+B)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse support (click panes, scroll, resize)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# True color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Reload config with prefix+r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and - (more intuitive than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vi keys for copy mode
setw -g mode-keys vi

# Status bar
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold] [#S] '
set -g status-right '#[fg=#a6e3a1]%H:%M  #[fg=#cdd6f4]%d %b'
set -g status-left-length 20
set -g window-status-current-style 'fg=#f38ba8,bold'

# Don't rename windows automatically
set-option -g allow-rename off
